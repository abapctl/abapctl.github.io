<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" role="img" aria-label="abapctl architecture: a reasoning layer drives abapctl, which calls SAP over HTTPS">
  <defs>
    <style>
      .sans { font-family: 'Inter', system-ui, 'Segoe UI', sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="880" height="560" rx="16" fill="#0b1220"/>

  <!-- Reasoning layer -->
  <g>
    <rect x="60" y="40" width="760" height="92" rx="12" fill="rgba(37,99,235,0.12)" stroke="#2563eb" stroke-width="1.5"/>
    <text x="80" y="70" class="mono" font-size="13" letter-spacing="2" fill="#60a5fa">REASONING LAYER</text>
    <text x="80" y="100" class="sans" font-size="20" font-weight="700" fill="#f8fafc">You · a script · a CI pipeline · an AI agent</text>
    <text x="80" y="122" class="sans" font-size="14" fill="#94a3b8">Judgment, multi-step planning, released-API research, code generation.</text>
  </g>

  <!-- arrows down into abapctl -->
  <line x1="440" y1="132" x2="440" y2="168" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="155" class="mono" font-size="12" fill="#94a3b8">intent + flags</text>

  <!-- abapctl box with internal layers -->
  <g>
    <rect x="60" y="170" width="760" height="230" rx="12" fill="#111a2b" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <text x="80" y="200" class="mono" font-size="13" letter-spacing="2" fill="#4ade80">ABAPCTL · DETERMINISTIC PRIMITIVE</text>

    <!-- four internal layers as a pipeline -->
    <g class="sans">
      <rect x="80"  y="222" width="168" height="96" rx="9" fill="#0b1220" stroke="rgba(255,255,255,0.12)"/>
      <text x="164" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">CLI</text>
      <text x="164" y="284" text-anchor="middle" font-size="11.5" fill="#94a3b8">args, flags,</text>
      <text x="164" y="300" text-anchor="middle" font-size="11.5" fill="#94a3b8">--json output</text>

      <rect x="268" y="222" width="168" height="96" rx="9" fill="#0b1220" stroke="rgba(255,255,255,0.12)"/>
      <text x="352" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Workflow</text>
      <text x="352" y="284" text-anchor="middle" font-size="11.5" fill="#94a3b8">assess, fix,</text>
      <text x="352" y="300" text-anchor="middle" font-size="11.5" fill="#94a3b8">create, delete</text>

      <rect x="456" y="222" width="168" height="96" rx="9" fill="#0b1220" stroke="rgba(255,255,255,0.12)"/>
      <text x="540" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Capabilities</text>
      <text x="540" y="284" text-anchor="middle" font-size="11.5" fill="#94a3b8">read, lock, write,</text>
      <text x="540" y="300" text-anchor="middle" font-size="11.5" fill="#94a3b8">activate, ATC…</text>

      <rect x="644" y="222" width="156" height="96" rx="9" fill="#0b1220" stroke="rgba(96,165,250,0.5)"/>
      <text x="722" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">SAP Client</text>
      <text x="722" y="284" text-anchor="middle" font-size="11.5" fill="#94a3b8">CSRF, cookies,</text>
      <text x="722" y="300" text-anchor="middle" font-size="11.5" fill="#94a3b8">retry, sessions</text>

      <!-- pipeline arrows -->
      <line x1="248" y1="270" x2="268" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="436" y1="270" x2="456" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="624" y1="270" x2="644" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    </g>

    <text x="80" y="352" class="sans" font-size="13" fill="#94a3b8">Every call is logged locally under</text>
    <text x="308" y="352" class="mono" font-size="13" fill="#cbd5e1">.abapctl/logs/</text>
    <text x="80" y="374" class="sans" font-size="13" fill="#94a3b8">Config from</text>
    <text x="168" y="374" class="mono" font-size="13" fill="#cbd5e1">.abapctl.json</text>
    <text x="290" y="374" class="sans" font-size="13" fill="#94a3b8">(connection, defaults).</text>
  </g>

  <!-- arrow down to SAP -->
  <line x1="722" y1="400" x2="722" y2="440" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="734" y="425" class="mono" font-size="12" fill="#94a3b8">HTTPS · ADT REST</text>

  <!-- SAP system -->
  <g>
    <rect x="60" y="442" width="760" height="82" rx="12" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.4)" stroke-width="1.5"/>
    <text x="80" y="472" class="mono" font-size="13" letter-spacing="2" fill="#4ade80">SAP SYSTEM</text>
    <text x="80" y="500" class="sans" font-size="16" font-weight="600" fill="#e2e8f0">ADT development API &amp; OData runtime, over HTTPS. Every change lands in the SAP audit trail.</text>
  </g>
</svg>
