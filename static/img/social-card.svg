<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="abapctl social card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.08" r="0.7">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: 'JetBrains Mono','SFMono-Regular',Menlo,monospace; }
      .sans { font-family: 'Inter',system-ui,'Segoe UI',sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo mark -->
  <g transform="translate(96,92)">
    <rect width="96" height="96" rx="22" fill="#0b1220" stroke="rgba(255,255,255,0.10)"/>
    <path d="M26 33l16 15-16 15" fill="none" stroke="#4ade80" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="50" y="58" width="24" height="8.5" rx="4.25" fill="#60a5fa"/>
  </g>

  <!-- eyebrow -->
  <text x="98" y="276" class="mono" font-size="26" letter-spacing="6" fill="#4ade80">HEADLESS · AGENTIC · JSON-FIRST</text>

  <!-- wordmark -->
  <text x="94" y="372" class="sans" font-size="116" font-weight="800" fill="#f8fafc" letter-spacing="-3">abapctl</text>

  <!-- tagline -->
  <text x="98" y="446" class="sans" font-size="48" font-weight="700" fill="#f8fafc">The ABAP engine for AI agents.</text>
  <text x="98" y="502" class="sans" font-size="30" font-weight="400" fill="#94a3b8">Read, write, check, and transport ABAP. Assess Clean</text>
  <text x="98" y="544" class="sans" font-size="30" font-weight="400" fill="#94a3b8">Core. Query OData. Headless, JSON-first, agent-driven.</text>

  <!-- terminal line -->
  <g transform="translate(98,588)">
    <text x="0" y="0" class="mono" font-size="27" fill="#4ade80">$</text>
    <text x="28" y="0" class="mono" font-size="27" fill="#e2e8f0">abapctl clean-core assess ZFINANCE </text>
    <text x="620" y="0" class="mono" font-size="27" fill="#60a5fa">--json</text>
  </g>
</svg>
